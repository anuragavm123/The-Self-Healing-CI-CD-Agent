name: CI + Self-Heal

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "demo/**"
  pull_request:
  workflow_dispatch:
    inputs:
      simulate_failure:
        description: "Inject a unit-test failure for demo purposes"
        required: false
        default: false
        type: boolean
      simulate_lint_failure:
        description: "Inject a lint failure (F401) for demo purposes"
        required: false
        default: false
        type: boolean
      simulate_scenario:
        description: "Advanced demo scenario"
        required: false
        default: none
        type: choice
        options:
          - none
          - nonmath_wordcount
          - multi_failure
          - lint_and_test

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      failed: ${{ steps.detect_failure.outputs.failed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Publish selected run mode
        shell: bash
        run: |
          mode="normal-ci"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.simulate_scenario }}" != "none" ]; then
              mode="scenario:${{ inputs.simulate_scenario }}"
            elif [ "${{ inputs.simulate_failure }}" = "true" ]; then
              mode="simulate_failure (unit test)"
            elif [ "${{ inputs.simulate_lint_failure }}" = "true" ]; then
              mode="simulate_lint_failure (ruff F401)"
            else
              mode="workflow_dispatch (no simulation)"
            fi
          fi

          {
            echo "## CI + Self-Heal Run Mode"
            echo ""
            echo "- Event: ${{ github.event_name }}"
            echo "- Mode: ${mode}"
            echo "- Ref: ${{ github.ref_name }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate demo inputs
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if [ "${{ inputs.simulate_scenario }}" != "none" ] && [ "${{ inputs.simulate_failure }}" = "true" -o "${{ inputs.simulate_lint_failure }}" = "true" ]; then
            echo "Choose either legacy toggles or simulate_scenario, not both"
            exit 1
          fi

          if [ "${{ inputs.simulate_failure }}" = "true" ] && [ "${{ inputs.simulate_lint_failure }}" = "true" ]; then
            echo "Choose only one demo mode: simulate_failure OR simulate_lint_failure"
            exit 1
          fi

      - name: Simulate advanced scenario (demo mode)
        if: github.event_name == 'workflow_dispatch' && inputs.simulate_scenario != 'none'
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          scenario = "${{ inputs.simulate_scenario }}"
          math_file = Path("src/math_utils.py")
          init_file = Path("src/__init__.py")

          math_text = math_file.read_text(encoding="utf-8")
          init_text = init_file.read_text(encoding="utf-8")

          if scenario == "nonmath_wordcount":
              math_text = math_text.replace("return count\n", "return count + 1\n", 1)
          elif scenario == "multi_failure":
              math_text = math_text.replace("return a + b\n", "return a + b + 1\n", 1)
              math_text = math_text.replace("return count\n", "return count + 1\n", 1)
          elif scenario == "lint_and_test":
              math_text = math_text.replace("return a + b\n", "return a + b + 1\n", 1)
              if "import os\n" not in init_text:
                  init_text = "import os\n\n" + init_text

          math_file.write_text(math_text, encoding="utf-8")
          init_file.write_text(init_text, encoding="utf-8")
          print(f"Injected advanced scenario: {scenario}")
          PY

      - name: Simulate failure (demo mode)
        if: github.event_name == 'workflow_dispatch' && inputs.simulate_failure
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          file_path = Path("src/math_utils.py")
          text = file_path.read_text(encoding="utf-8")
          if "return a + b\n" in text:
              file_path.write_text(text.replace("return a + b\n", "return a + b + 1\n", 1), encoding="utf-8")
          print("Injected demo failure into src/math_utils.py")
          PY

      - name: Simulate lint failure (demo mode)
        if: github.event_name == 'workflow_dispatch' && inputs.simulate_lint_failure && !inputs.simulate_failure
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          file_path = Path("src/__init__.py")
          text = file_path.read_text(encoding="utf-8")
          if "import os\n" not in text:
              file_path.write_text("import os\n\n" + text, encoding="utf-8")
          print("Injected lint failure (F401) into src/__init__.py")
          PY

      - name: Run tests and lint (capture logs)
        id: ci_checks
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          (python -m pytest -q && python -m ruff check .) 2>&1 | tee ci_failure.log

      - name: Upload failure log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-log
          path: ci_failure.log

      - name: Detect failure state
        id: detect_failure
        shell: bash
        run: |
          if [ "${{ steps.ci_checks.outcome }}" = "success" ]; then
            echo "failed=false" >> "$GITHUB_OUTPUT"
          else
            echo "failed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Mark CI as failed when checks fail
        if: steps.detect_failure.outputs.failed == 'true'
        run: exit 1

  self_heal:
    needs: ci
    runs-on: ubuntu-latest
    if: |
      always() &&
      (needs.ci.result == 'failure' || needs.ci.outputs.failed == 'true') &&
      !startsWith(github.ref_name, 'self-heal/') &&
      github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download failure logs
        uses: actions/download-artifact@v4
        with:
          name: ci-failure-log

      - name: Run self-healing agent
        id: heal
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || secrets.OPENAI }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o' }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'openai' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-chat' }}
          APIFREELLM_API_KEY: ${{ secrets.APIFREELLM_API_KEY || secrets.APIFREELLM }}
          APIFREELLM_MODEL: ${{ vars.APIFREELLM_MODEL || 'deepseek-chat' }}
          APIFREELLM_BASE_URL: ${{ vars.APIFREELLM_BASE_URL || 'https://apifreellm.com/api/v1' }}
          APIFREELLM_CHAT_URL: ${{ vars.APIFREELLM_CHAT_URL || 'https://apifreellm.com/api/v1/chat' }}
          OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL || 'http://127.0.0.1:11434/v1' }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL || 'qwen2.5-coder:7b' }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY || 'ollama' }}
        run: |
          python scripts/run_self_heal.py --log-file ci_failure.log --repo-root . --output self_heal_result.json
          cat self_heal_result.json

      - name: Read self-heal result
        if: steps.heal.outcome == 'success'
        id: heal_result
        shell: bash
        run: |
          python - <<'PY'
          import json

          with open("self_heal_result.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          with open("$GITHUB_OUTPUT", "a", encoding="utf-8") as out:
              out.write(f"fix_applied={str(data.get('fix_applied', False)).lower()}\n")
              out.write(f"validation_ok={str(data.get('validation_ok', False)).lower()}\n")
              out.write(f"root_cause={str(data.get('root_cause', 'Unknown CI failure'))}\n")
          PY

      - name: Verify fix by re-running checks
        if: steps.heal.outcome == 'success'
        id: recheck
        shell: bash
        run: |
          set +e
          python -m pytest -q
          pytest_rc=$?
          python -m ruff check .
          ruff_rc=$?

          if [ "$pytest_rc" -eq 0 ] && [ "$ruff_rc" -eq 0 ]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
          fi

          exit 0

      - name: Set change status
        if: steps.heal.outcome == 'success'
        id: has_changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check auto PR token
        id: pr_token
        shell: bash
        run: |
          if [ -n "${{ secrets.AUTO_PR_TOKEN }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request with auto-fix
        continue-on-error: true
        if: github.event_name != 'pull_request' && steps.pr_token.outputs.available == 'true' && steps.has_changes.outputs.changed == 'true' && steps.recheck.outputs.passed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.AUTO_PR_TOKEN }}
          branch: self-heal/${{ github.run_id }}-${{ github.run_attempt }}
          commit-message: "fix(ci): self-healing patch for failed pipeline"
          title: "fix(ci): self-healing patch for failed pipeline"
          body: |
            ## 🤖 Self-Healing CI/CD Agent

            This PR was created automatically after a failed CI run.

            ### What happened
            - CI detected failed test/lint checks.
            - Agent analyzed `ci_failure.log`.
            - Proposed and applied a minimal fix.
            - Re-ran checks before opening this PR.

            ### Why
            Reduce Mean Time To Repair (MTTR) for routine failures.
          labels: |
            automated-fix
            self-healing

      - name: Explain PR decision
        if: always()
        shell: bash
        run: |
          {
            echo "## Self-Heal PR Decision"
            echo ""
            echo "- Agent run success: ${{ steps.heal.outcome == 'success' }}"
            echo "- Agent fix applied: ${{ steps.heal_result.outputs.fix_applied || 'false' }}"
            echo "- Agent validation_ok: ${{ steps.heal_result.outputs.validation_ok || 'false' }}"
            echo "- Agent root cause: ${{ steps.heal_result.outputs.root_cause || 'unknown' }}"
            echo "- Event is pull_request: ${{ github.event_name == 'pull_request' }}"
            echo "- Auto PR token available: ${{ steps.pr_token.outputs.available || 'false' }}"
            echo "- Fix changed files: ${{ steps.has_changes.outputs.changed || 'false' }}"
            echo "- Recheck passed: ${{ steps.recheck.outputs.passed || 'false' }}"
            echo ""
            echo "PR is created only when: event != pull_request, token=true, changed=true, recheck=true"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Explain no-PR outcome
        if: always()
        shell: bash
        run: |
          heal_outcome="${{ steps.heal.outcome }}"
          fix_applied="${{ steps.heal_result.outputs.fix_applied || 'false' }}"
          validation_ok="${{ steps.heal_result.outputs.validation_ok || 'false' }}"
          changed="${{ steps.has_changes.outputs.changed || 'false' }}"
          recheck_passed="${{ steps.recheck.outputs.passed || 'false' }}"
          token_available="${{ steps.pr_token.outputs.available || 'false' }}"
          event_name="${{ github.event_name }}"

          if [ "$heal_outcome" != "success" ]; then
            echo "Self-healing agent execution failed."
          elif [ "$fix_applied" != "true" ]; then
            echo "No fix proposal could be safely applied from the failure log."
          elif [ "$validation_ok" != "true" ] || [ "$recheck_passed" != "true" ]; then
            echo "A fix was applied, but validation checks did not pass."
          elif [ "$changed" != "true" ]; then
            echo "Agent reported a fix, but no repository changes were detected."
          elif [ "$event_name" = "pull_request" ]; then
            echo "Validated fix produced, but PR creation is skipped for pull_request events."
          elif [ "$token_available" != "true" ]; then
            echo "Validated fix produced, but AUTO_PR_TOKEN is not configured."
          else
            echo "Validated fix produced; PR creation conditions were satisfied."
          fi
