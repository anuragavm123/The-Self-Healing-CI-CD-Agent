name: CI + Self-Heal

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "demo/**"
  pull_request:
  workflow_dispatch:
    inputs:
      simulate_failure:
        description: "Inject a unit-test failure for demo purposes"
        required: false
        default: false
        type: boolean
      simulate_lint_failure:
        description: "Inject a lint failure (F401) for demo purposes"
        required: false
        default: false
        type: boolean

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      failed: ${{ steps.detect_failure.outputs.failed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Publish selected run mode
        shell: bash
        run: |
          mode="normal-ci"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.simulate_failure }}" = "true" ]; then
              mode="simulate_failure (unit test)"
            elif [ "${{ inputs.simulate_lint_failure }}" = "true" ]; then
              mode="simulate_lint_failure (ruff F401)"
            else
              mode="workflow_dispatch (no simulation)"
            fi
          fi

          {
            echo "## CI + Self-Heal Run Mode"
            echo ""
            echo "- Event: ${{ github.event_name }}"
            echo "- Mode: ${mode}"
            echo "- Ref: ${{ github.ref_name }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate demo inputs
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if [ "${{ inputs.simulate_failure }}" = "true" ] && [ "${{ inputs.simulate_lint_failure }}" = "true" ]; then
            echo "Choose only one demo mode: simulate_failure OR simulate_lint_failure"
            exit 1
          fi

      - name: Simulate failure (demo mode)
        if: github.event_name == 'workflow_dispatch' && inputs.simulate_failure
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          file_path = Path("src/math_utils.py")
          text = file_path.read_text(encoding="utf-8")
          if "return a + b\n" in text:
              file_path.write_text(text.replace("return a + b\n", "return a + b + 1\n", 1), encoding="utf-8")
          print("Injected demo failure into src/math_utils.py")
          PY

      - name: Simulate lint failure (demo mode)
        if: github.event_name == 'workflow_dispatch' && inputs.simulate_lint_failure && !inputs.simulate_failure
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          file_path = Path("src/__init__.py")
          text = file_path.read_text(encoding="utf-8")
          if "import os\n" not in text:
              file_path.write_text("import os\n\n" + text, encoding="utf-8")
          print("Injected lint failure (F401) into src/__init__.py")
          PY

      - name: Run tests and lint (capture logs)
        id: ci_checks
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          (python -m pytest -q && python -m ruff check .) 2>&1 | tee ci_failure.log

      - name: Upload failure log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-log
          path: ci_failure.log

      - name: Detect failure state
        id: detect_failure
        shell: bash
        run: |
          if [ "${{ steps.ci_checks.outcome }}" = "success" ]; then
            echo "failed=false" >> "$GITHUB_OUTPUT"
          else
            echo "failed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Mark CI as failed when checks fail
        if: steps.detect_failure.outputs.failed == 'true'
        run: exit 1

  self_heal:
    needs: ci
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.ci.outputs.failed == 'true' &&
      github.event_name != 'pull_request' &&
      !startsWith(github.ref_name, 'self-heal/') &&
      github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download failure logs
        uses: actions/download-artifact@v4
        with:
          name: ci-failure-log

      - name: Run self-healing agent
        id: heal
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o' }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'openai' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-coder' }}
          OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL || 'http://127.0.0.1:11434/v1' }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL || 'qwen2.5-coder:7b' }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY || 'ollama' }}
        run: |
          python scripts/run_self_heal.py --log-file ci_failure.log --repo-root . --output self_heal_result.json
          cat self_heal_result.json

      - name: Verify fix by re-running checks
        if: steps.heal.outcome == 'success'
        continue-on-error: true
        id: recheck
        run: |
          python -m pytest -q
          python -m ruff check .

      - name: Set change status
        if: steps.heal.outcome == 'success'
        id: has_changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request with auto-fix
        continue-on-error: true
        if: steps.has_changes.outputs.changed == 'true' && steps.recheck.outcome == 'success'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.AUTO_PR_TOKEN || secrets.GITHUB_TOKEN }}
          branch: self-heal/${{ github.run_id }}
          commit-message: "fix(ci): self-healing patch for failed pipeline"
          title: "fix(ci): self-healing patch for failed pipeline"
          body: |
            ## 🤖 Self-Healing CI/CD Agent

            This PR was created automatically after a failed CI run.

            ### What happened
            - CI detected failed test/lint checks.
            - Agent analyzed `ci_failure.log`.
            - Proposed and applied a minimal fix.
            - Re-ran checks before opening this PR.

            ### Why
            Reduce Mean Time To Repair (MTTR) for routine failures.
          labels: |
            automated-fix
            self-healing

      - name: No-op when no validated fix
        if: steps.heal.outcome != 'success' || steps.has_changes.outputs.changed != 'true' || steps.recheck.outcome != 'success'
        run: echo "No validated fix produced by self-healing agent."
